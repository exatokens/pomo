<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Yesterday summary modal -->
  <div id="yesterday-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-icon">🌅</span>
        <h2>Yesterday's Accomplishments</h2>
      </div>
      <div id="yesterday-list" class="yesterday-list"></div>
      <button id="close-yesterday" class="btn-primary">Let's Go Today →</button>
    </div>
  </div>

  <!-- Main layout -->
  <div class="app">
    <!-- Left panel: timer + controls -->
    <div class="left-panel">
      <div class="app-title">POMO</div>
      <div class="phase-label" id="phase-label">Focus</div>

      <div class="timer-ring-wrap">
        <svg class="timer-ring" viewBox="0 0 220 220">
          <circle class="ring-bg" cx="110" cy="110" r="100" />
          <circle class="ring-progress" id="ring-progress" cx="110" cy="110" r="100"
            stroke-dasharray="628.3" stroke-dashoffset="0" />
        </svg>
        <div class="timer-display" id="timer-display">35:00</div>
      </div>

      <div class="pomodoro-dots" id="pomodoro-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <div class="controls">
        <button class="btn-secondary" id="btn-reset" title="Reset">↺</button>
        <button class="btn-primary" id="btn-start">Start</button>
        <button class="btn-secondary" id="btn-skip" title="Skip break">⏭</button>
      </div>

      <div class="session-count">
        Pomodoro <span id="session-num">1</span> of cycle
      </div>
    </div>

    <!-- Right panel: accomplishments list + detail -->
    <div class="right-panel">
      <div class="right-header">
        <h3>Today's Work</h3>
        <span class="date-label" id="date-label"></span>
      </div>

      <div class="accomplishments-area">
        <!-- List column -->
        <div class="acc-list" id="acc-list">
          <div class="empty-state" id="empty-state">
            <div class="empty-icon">⏱</div>
            <p>Complete a pomodoro to log your first accomplishment.</p>
          </div>
        </div>

        <!-- Detail column -->
        <div class="acc-detail hidden" id="acc-detail">
          <button class="detail-close" id="detail-close">✕</button>
          <div class="detail-type-badge" id="detail-type"></div>
          <h4 id="detail-title"></h4>
          <div class="detail-meta" id="detail-meta"></div>
          <div class="detail-source-label">Source</div>
          <a class="detail-source" id="detail-source" target="_blank"></a>
          <div id="detail-topic-wrap" class="detail-topic-wrap hidden">
            <div class="detail-source-label">Topic</div>
            <div class="detail-topic" id="detail-topic"></div>
          </div>
          <div class="detail-time-wrap">
            <div class="detail-source-label">Session</div>
            <div class="detail-time" id="detail-time"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
